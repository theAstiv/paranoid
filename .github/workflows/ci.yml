name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Python
  # ─────────────────────────────────────────────────────────────────────────────

  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check backend/ cli/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ cli/ tests/

  test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        # test_pipeline_e2e.py requires a live LLM provider (ANTHROPIC_API_KEY)
        # and the context-link binary — both absent in CI runners.
        run: pytest tests/ -v --tb=short --ignore=tests/test_pipeline_e2e.py

  build-check:
    name: Python Package Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────────────────

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker
  # ─────────────────────────────────────────────────────────────────────────────

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    # Require both frontend jobs: Docker should only build when the SPA is healthy.
    needs: [frontend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the frontend stage (node:20-alpine + npm ci + npm run build).
      # Because Docker parses the full Dockerfile before executing any stage, this
      # also catches Dockerfile syntax errors across all three stages.
      - name: Build frontend stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frontend-builder
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build the full multi-stage image (includes context-link binary download
      # from GitHub Releases and the Python pip install).
      # If the context-link release URL becomes unreachable this step will fail;
      # in that case update CONTEXT_LINK_VERSION in the Dockerfile or mirror the
      # binary to a stable URL.
      - name: Build full image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
