name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Build Python package for PyPI
  build-package:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  # Build standalone binaries for Linux, macOS, Windows
  build-binaries:
    name: Build Binary - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: paranoid-linux-x64
            binary_path: dist/paranoid
          - os: macos-latest
            artifact_name: paranoid-macos-arm64
            binary_path: dist/paranoid
          - os: windows-latest
            artifact_name: paranoid-windows-x64.exe
            binary_path: dist/paranoid.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller paranoid.spec

      - name: Test binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/paranoid
          ./dist/paranoid --help
          ./dist/paranoid version

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        run: |
          dist\paranoid.exe --help
          dist\paranoid.exe version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}

  # Publish to PyPI
  publish-pypi:
    name: Publish to PyPI
    needs: build-package
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/paranoid-cli
    permissions:
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # Create GitHub Release with binaries
  create-release:
    name: Create GitHub Release
    needs: [build-package, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Paranoid v${{ steps.get_version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            python-package/*
            paranoid-linux-x64/paranoid
            paranoid-macos-arm64/paranoid
            paranoid-windows-x64.exe/paranoid.exe
          token: ${{ secrets.GITHUB_TOKEN }}
