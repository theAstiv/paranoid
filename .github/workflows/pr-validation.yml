name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  validate-pr:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check version consistency
        run: |
          python -c "
          import re
          from pathlib import Path

          # Read version from pyproject.toml [project] section
          pyproject = Path('pyproject.toml').read_text()
          match = re.search(r'^\[project\].*?^version\s*=\s*\"([^\"]+)\"', pyproject, re.MULTILINE | re.DOTALL)
          if match:
              print(f'✓ Version: {match.group(1)}')
          else:
              print('✗ Version not found in pyproject.toml')
              exit(1)
          "

      - name: Run linting
        run: |
          echo "::group::Ruff Check"
          python -m ruff check backend/ cli/ tests/
          echo "::endgroup::"

          echo "::group::Ruff Format Check"
          python -m ruff format --check backend/ cli/ tests/
          echo "::endgroup::"

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml

      - name: Check for TODO/FIXME comments
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD | grep -E "^\+.*TODO|FIXME"; then
            echo "::warning::PR introduces new TODO/FIXME comments"
          fi
        continue-on-error: true

      - name: PR Summary
        if: always()
        run: |
          echo "## ✅ PR Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks passed! This PR is ready for review." >> $GITHUB_STEP_SUMMARY
